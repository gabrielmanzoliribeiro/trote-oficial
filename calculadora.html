    <body>
       <nav class="menu-principal">
        <div class="menu-container">
            <a href="index.html" class="logo"> Trote 2026 </a>
            <ul class="lista">
                <li> <a href="index.html"> Início </a> </li>

       </nav>
     
       <main class="principal">
            <section>
                <h3>🧮 Calculadora de Pontos</h3>
                <div class="form-group">
                    <label> Arroz (5kg) </label>
                    <input type="number" value="0" min="0" id="qtdeArroz">
                </div>
                <div class="form-group">
                    <label> Feijão (2kg) </label>
                    <input type="number" value="0" min="0" id="qtdeFeijao"> 
                </div>
                <div class="form-group">
                    <label> Óleo (1L) </label>
                    <input type="number" value="0" min="0" id="qtdeOleo">
                </div>
                <div class="form-group">
                    <label> Macarrão (500g) </label>
                    <input type="number" value="0" min="0" id="qtdemacarrao">
                </div>
                <button onclick="calcular()"> Calcular Total </button>
                <div id="result" class="resultado">  
                     Pontuação Total: 0 pontos 
 
                </div>
                
                
            </section>
       </main>    
        <footer class="rodape">
            <p>Coordenação Trote Solidário 2026: trotesolidario@facef.br </p>
            <p>Uni-FACEF - Centro Universitário Municipal de Franca </p>
        </footer>
        <script>
            function calcular(){
                let qtdeArroz = Number(document.getElementById("qtdeArroz").value)
                let qtdeFeijao = Number(document.getElementById("qtdeFeijao").value)
                let qtdeOleo = Number(document.getElementById("qtdeOleo").value)
                let qtdemacarrao = Number(document.getElementById("qtdemacarrao").value)
                let pontos = (qtdeArroz * 10) + (qtdeFeijao * 8) + (qtdeOleo * 2) + (qtdemacarrao * 4)
                document.getElementById("result").innerText = "Pontuação Total: " + pontos ; 
            }
        </script>
    </body>
